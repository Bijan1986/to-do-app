name: my-first-workflow
on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build (producer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-jar
          path: build/libs/*.jar

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/test-results/**/*.xml

  consume:
    name: Consume artifacts (consumer)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: todo-app-jar
          path: artifacts/jar

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: artifacts/test-reports

      - name: Set up JDK 17 (for optional smoke-run)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Inspect downloaded artifacts
        run: |
          echo "Contents of artifacts/jar:"
          ls -la artifacts/jar || true
          echo "Contents of artifacts/test-reports:"
          ls -la artifacts/test-reports || true

      - name: Show JAR contents (smoke check)
        run: |
          JAR_FILE=$(ls artifacts/jar/*.jar 2>/dev/null | head -n1 || true)
          if [ -n "$JAR_FILE" ]; then
            echo "Listing top-level entries inside $JAR_FILE:" 
            jar tf "$JAR_FILE" | sed -n '1,40p'
          else
            echo "No JAR found to inspect"
          fi
