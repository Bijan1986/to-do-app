name: my-first-workflow
# To get a trigger on every push in this repo in any branch
on: push

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Running Single Command in Job1
        run: echo "Hi this is my first GitHub workflow"
      - name: Checking OS Release for Github hosted Runner
        run: cat /etc/os-release

  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
      - name: Checking the hostname of the Github hosted Runner
        run: hostname
      - name: Running Multiple Commands in Job2
        run: |
          echo "Hi from Bijan Nayak"
          echo "Current time is $(date)"