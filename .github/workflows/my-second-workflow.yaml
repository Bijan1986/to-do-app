name: workflow-revision
on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: Build todo-app
    runs-on: ubuntu-latest
    steps:
      - name: Check directory structure before checkout
        run: |
            echo "Current directory: $(pwd)"
            echo "Contents:"
            ls -la
      - name: Checkout code from repository
        uses: actions/checkout@v4
      - name: Check directory structure after checkout
        run: |
            echo "Current directory: $(pwd)"
            echo "Contents:"
            ls -la
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-jar
          path: build/libs/*-SNAPSHOT.jar

  download:
    name: Download artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: todo-app-jar
          path: todo-app-jar

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la todo-app-jar

      - name: Run JAR in background
        run: |
          nohup java -jar todo-app-jar/*.jar > app.log 2>&1 &
          echo $! > app.pid

      - name: Check application is running
        run: |
          echo "Checking if application is running..."
          sleep 10
          curl -f http://localhost:8080/ || (echo "Application is not running" && cat app.log && exit 1)